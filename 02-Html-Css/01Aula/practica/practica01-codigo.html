<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .linha-total {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 1240px;
            height: 800px;
        }
        .linha-um {
            display: flex;
            height: 50%;
            background-color: blue;
            margin-bottom: 5px;
        }
        .linha-dois {
            display: flex;
            height: 50%;
            background-color: purple;
        }
        .coluna-um {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: green;
            height: 100%;
            flex: 1;
        }
        .coluna-dois {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: yellow;
            height: 100%;
            flex: 1;
        }
        .objeto {
            width: 350px;
            height: 150px;
            background-color: blue;
        }
        .coluna-um-linha-dois {
            background-color: purple;
            height: 100%;
            flex: 1;
        }
        .coluna-dois-linha-dois {
            background-color: yellow;
            height: 100%;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="linha-total">
        <div class="container">
            <div class="linha-um">
                <div class="coluna-um">
                    <div class="objeto"></div>
                </div>
                <div class="coluna-dois">
                    <div class="objeto"></div>
                </div>
            </div>
            <div class="linha-dois">
                <div class="coluna-um-linha-dois"></div>
                <div class="coluna-dois-linha-dois"></div>
                <div class="coluna-um-linha-dois"></div>
            </div>
        </div>
    </div>
</body>
</html>
